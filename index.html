<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stargate 51 — Voyage</title>
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <style>
    html, body { margin: 0; height: 100%; overflow: hidden; background: #000; }
    #gate {
      position: fixed; inset: 0; z-index: 30;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 1.6rem; background: #000; color: #c8c4b8; user-select: none;
      font-family: "Courier New", Courier, monospace;
      letter-spacing: 0.28em; text-transform: uppercase;
    }
    #gate[hidden] { display: none; }
    #gate h1 { margin: 0; font-weight: 400; font-size: clamp(1rem, 3vw, 1.5rem); opacity: 0.85; }
    #gate .sub { margin: 0; font-size: 0.65rem; letter-spacing: 0.18em; opacity: 0.4; }
    #serveWarn {
      display: none; max-width: 34rem; margin: 0 1rem; padding: 0.9rem 1rem;
      border: 1px solid rgba(255, 80, 60, 0.55); background: rgba(40, 8, 4, 0.92);
      color: #ffc8b8; font-size: 0.62rem; letter-spacing: 0.08em; line-height: 1.55;
      text-transform: none; text-align: left;
    }
    #serveWarn strong { color: #ffe600; letter-spacing: 0.12em; text-transform: uppercase; }
    #serveWarn code {
      display: block; margin-top: 0.55rem; padding: 0.45rem 0.55rem;
      background: rgba(0,0,0,0.45); color: #9fe8ff; letter-spacing: 0.04em;
      word-break: break-all; font-size: 0.7rem;
    }
    body.bad-origin #btnVr { opacity: 0.35; pointer-events: none; }
    #gate .btns { display: flex; flex-wrap: wrap; gap: 0.75rem; justify-content: center; }
    #gate button {
      font: inherit; letter-spacing: 0.2em; text-transform: uppercase;
      background: rgba(0,0,0,0.7); color: #c8c4b8;
      border: 1px solid rgba(200,196,184,0.4);
      padding: 0.75rem 1.25rem; cursor: pointer; min-width: 7.5rem;
    }
    #gate button:hover { border-color: #ffe600; color: #ffe600; }
    #gate button small { display: block; margin-top: 0.35rem; font-size: 0.55rem;
      letter-spacing: 0.12em; opacity: 0.45; text-transform: none; }
    #flash {
      position: fixed; inset: 0; z-index: 25; pointer-events: none;
      background: #fff; opacity: 0; mix-blend-mode: screen;
    }
    #display {
      position: fixed; inset: 0; z-index: 5; width: 100%; height: 100%;
      background: #000; object-fit: contain;
    }
    #display[hidden] { display: none; }
    /* Voyage buffer drawn every frame; also used as VR screen texture */
    #view {
      position: fixed; left: -9999px; top: 0;
      width: 1280px; height: 720px;
      pointer-events: none;
    }
    /* Voyage stays fully visible until headset session actually starts */
    body.mode-vr #display { display: block !important; opacity: 1; z-index: 7; }
    body.mode-vr.vr-immersive #display { display: none !important; }
    body.mode-vr #vrHint {
      display: block; position: fixed; bottom: 1.25rem; left: 50%; transform: translateX(-50%);
      z-index: 40; color: #c8c4b8; font: 0.65rem "Courier New", monospace;
      letter-spacing: 0.14em; text-transform: uppercase; opacity: 0.75;
      pointer-events: none; text-align: center;
    }
    #vrHint { display: none; }

    #scene {
      position: fixed; inset: 0; z-index: 4;
      width: 100%; height: 100%;
      opacity: 0; pointer-events: none;
    }
    body.mode-vr #scene {
      opacity: 1; pointer-events: auto; z-index: 6;
    }
    body.mode-sbs #display { display: none !important; }
    #stereo-sbs {
      position: fixed; inset: 0; z-index: 5; width: 100%; height: 100%;
      background: #000; display: none; object-fit: fill;
    }
    body.mode-sbs #stereo-sbs { display: block !important; }
    .a-enter-vr-button, .a-enter-ar-button {
      font-family: "Courier New", Courier, monospace !important;
      letter-spacing: 0.14em !important;
      text-transform: uppercase !important;
      background: rgba(0,0,0,0.72) !important;
      border: 1px solid rgba(200,196,184,0.45) !important;
      color: #c8c4b8 !important;
      padding: 0.55rem 1rem !important;
    }
    body:not(.mode-vr) .a-enter-vr-button,
    body:not(.mode-vr) .a-enter-ar-button {
      display: none !important;
    }
    body.mode-vr .a-enter-vr-button {
      display: block !important;
      bottom: 4rem !important;
    }
    .a-enter-vr-button:hover {
      border-color: #ffe600 !important;
      color: #ffe600 !important;
    }
  </style>
</head>
<body>
  <div id="gate">
    <h1>Enter the Star Gate</h1>
    <p class="sub">stargate51 · VR gate locked in the room — look around freely</p>
    <div id="serveWarn" role="alert"></div>
    <div class="btns">
      <button type="button" id="btnFlat">Enter<small>fullscreen tunnel</small></button>
      <button type="button" id="btnSbs">3D<small>depth tunnel · SBS</small></button>
      <button type="button" id="btnVr">VR<small>immersive headset</small></button>
    </div>
  </div>
  <div id="flash"></div>
  <canvas id="display" hidden></canvas>
  <canvas id="stereo-sbs" hidden></canvas>
  <canvas id="view" width="1280" height="720"></canvas>
  <p id="vrHint">Voyage is running — use the VR button (bottom) or your headset prompt</p>

  <a-scene
    id="scene"
    background="color: #000000"
    renderer="colorManagement: true; antialias: false; alpha: false; highRefreshRate: true"
    vr-mode-ui="enabled: true"
    device-orientation-permission-ui="enabled: false"
    loading-screen="enabled: false"
    webxr="referenceSpaceType: local-floor; optionalFeatures: local-floor, bounded-floor"
  >
    <!-- WORLD screen: direct child of scene — NOT under camera or rig -->
    <a-plane
      id="tube"
      width="16"
      height="9"
      position="0 1.6 -3.4"
      rotation="0 0 0"
      material="shader: flat; color: #111; side: double"
      world-fixed-screen="dist: 3.4; y: 1.6"
      voyage-screen="canvas: #view"
    ></a-plane>

    <a-entity id="rig" position="0 0 0">
      <a-camera
        id="cam"
        position="0 1.6 0"
        look-controls="enabled: true; pointerLockEnabled: false; magicWindowTrackingEnabled: false"
        wasd-controls="enabled: false"
        fov="90"
        near="0.05"
        far="80"
      ></a-camera>
    </a-entity>
    <a-sky color="#000000"></a-sky>
  </a-scene>

    <script>
    /**
     * Pin the voyage screen in WORLD space every frame AFTER headset pose
     * (tock). Parent must be a-scene — never camera/rig — or looking around
     * drags the gate with your head.
     */
    AFRAME.registerComponent('world-fixed-screen', {
      schema: {
        dist: { type: 'number', default: 3.4 },
        y: { type: 'number', default: 1.6 }
      },
      init: function () {
        this._pinned = false;
      },
      tick: function () {
        this.pin();
      },
      tock: function () {
        // Runs after camera/XR pose — re-assert world pose so nothing overrides us
        this.pin();
      },
      pin: function () {
        const scene = this.el.sceneEl;
        if (!scene) return;
        if (this.el.parentNode !== scene) {
          scene.appendChild(this.el);
        }
        const o3 = this.el.object3D;
        o3.position.set(0, this.data.y, -this.data.dist);
        o3.rotation.set(0, 0, 0);
        o3.quaternion.set(0, 0, 0, 1);
        o3.scale.set(1, 1, 1);
        o3.updateMatrix();
      }
    });

    AFRAME.registerComponent('voyage-screen', {
      schema: { canvas: { type: 'selector' } },
      init: function () {
        this._map = null;
      },
      tick: function () {
        try {
          if (typeof window.__stargateVoyageTick === 'function') {
            window.__stargateVoyageTick(performance.now());
          }
          const canvas = this.data.canvas || document.getElementById('view');
          if (!canvas) return;
          const mesh = this.el.getObject3D('mesh');
          if (!mesh || !mesh.material) return;
          const THREE = AFRAME.THREE;
          if (!this._map) {
            this._map = new THREE.CanvasTexture(canvas);
            if ('colorSpace' in this._map && THREE.SRGBColorSpace) {
              this._map.colorSpace = THREE.SRGBColorSpace;
            } else if ('encoding' in this._map) {
              this._map.encoding = THREE.sRGBEncoding;
            }
            this._map.flipY = true;
            this._map.minFilter = THREE.LinearFilter;
            this._map.magFilter = THREE.LinearFilter;
            this._map.generateMipmaps = false;
            mesh.material.map = this._map;
            mesh.material.color.set('#ffffff');
            mesh.material.needsUpdate = true;
          }
          this._map.needsUpdate = true;
        } catch (e) {}
      }
    });

    /**
     * stargate51 — voyage screen is scene-rooted and world-pinned (not head-locked).
     */
    (function () {
      const gate = document.getElementById('gate');
      const view = document.getElementById('view');
      const vctx = view.getContext('2d', { alpha: false });
      const display = document.getElementById('display');
      const dctx = display.getContext('2d', { alpha: false });
      const flashEl = document.getElementById('flash');
      const sceneEl = document.getElementById('scene');
      const serveWarn = document.getElementById('serveWarn');
      let flashAmt = 0;
      function punchFlash(a) { /* centre screen flashes spoil the void */ }

      const isFileOrigin = location.protocol === 'file:';
      const isSecure = window.isSecureContext === true;
      const hostHint = (location.hostname && location.hostname !== 'localhost' && location.hostname !== '127.0.0.1')
        ? location.hostname
        : '192.168.1.76';
      const httpsUrl = 'https://' + hostHint + ':8900/stargate51.html';

      function showOriginWarn(html) {
        if (!serveWarn) return;
        serveWarn.style.display = 'block';
        serveWarn.innerHTML = html;
        document.body.classList.add('bad-origin');
      }

      if (isFileOrigin) {
        showOriginWarn(
          '<strong>Opened as file:// — VR cannot start</strong><br>' +
          'That console error is normal for file URLs. On your Mac run ' +
          '<code>python3 serve-https.py</code> then open:<code>' + httpsUrl + '</code>' +
          'On Quest Browser: accept the certificate warning, then tap VR.'
        );
      } else if (!isSecure) {
        showOriginWarn(
          '<strong>HTTP is not a secure context — Quest WebXR will freeze / fail</strong><br>' +
          'Use HTTPS instead:<code>python3 serve-https.py</code><code>' + httpsUrl + '</code>'
        );
      }

      const SCAN_W = 1280;
      const SCAN_H = 720;
      let presentMode = 'flat'; // flat | sbs | vr

      let bufA = document.createElement('canvas');
      let bufB = document.createElement('canvas');
      let aCtx = bufA.getContext('2d', { alpha: false });
      let bCtx = bufB.getContext('2d', { alpha: false });

      // Dual artwork plates for smooth crossfades
      const artA = document.createElement('canvas');
      const artB = document.createElement('canvas');
      const artACtx = artA.getContext('2d', { alpha: false });
      const artBCtx = artB.getContext('2d', { alpha: false });
      let artFront = artA; // currently dominant
      let artBack = artB;  // fading in
      let artFrontCtx = artACtx;
      let artBackCtx = artBCtx;
      let artBlend = 1; // 1 = fully on front; during fade, draw back with rising alpha
      let artFading = false;
      const ART_BLEND_DUR = 3.2;
      let artFadeT0 = 0;
      const ART_W = 720;
      const ART_H = 512;

      let artScroll = 0;
      let artScrollY = 0;
      let running = false;
      let t0 = 0;
      let lastNow = 0;
      let artGen = 0;
      let nextArtAt = 0;
      let styleId = 0;
      let lastTraverseCol = 0;
      const electro = []; // rays/beams/gates living briefly near centre before expand takes them
      let nextElectroAt = 0.4;
      let nextZoneAt = 6;
      let zoneKind = 'sheets'; // rays | beams | grid | gates | pulse
      const ZONE_CYCLE = ['sheets', 'jagged', 'beams', 'rings', 'forks', 'shards', 'ribbons', 'rays', 'gates', 'glyphs', 'sparks', 'veils', 'comets', 'jagged', 'sheets'];
      let zoneIdx = 0;

      let tintHue = 200;
      let tintHueTarget = 200;

      // Desert landscape phase (mountain2 incorporated)
      let phase = 'tunnel'; // tunnel | desert
      let nextDesertAt = 150 + Math.random() * 60; // ~2.5–3.5 min
      let desertUntil = 0;
      let desertStyle = 0;
      let nextDesertArtAt = 0;
      let camZ = 0;
      let camX = 0;
      let groundHue = 320;
      let groundHueTarget = 320;
      let desertInvert = 0;
      let nextDesertInvertAt = 0;
      let nextDesertPaletteAt = 0;
      let nextCrystalAt = 0;
      let lastDesertWhooshZ = 0;
      let phaseFade = 0; // 0..1 whiteout during enter/exit
      let phaseFadeDir = 0; // 1 entering desert mid, -1 leaving mid
      const crystals = [];
      const stars = [];
      for (let si = 0; si < 220; si++) {
        stars.push({
          x: Math.random(),
          y: Math.random() * 0.48,
          s: 0.4 + Math.random() * 1.4,
          a: 0.35 + Math.random() * 0.65
        });
      }
      const TERRAIN_W = 512;
      const TERRAIN_H = 512;
      const terrainA = document.createElement('canvas');
      const terrainB = document.createElement('canvas');
      const terrainACtx = terrainA.getContext('2d', { alpha: false });
      const terrainBCtx = terrainB.getContext('2d', { alpha: false });
      let terrainFront = terrainA;
      let terrainBack = terrainB;
      let terrainFrontCtx = terrainACtx;
      let terrainBackCtx = terrainBCtx;
      let terrainBlend = 1;
      let terrainFading = false;
      let terrainFadeT0 = 0;
      const TERRAIN_BLEND_DUR = 5.5;
      const faceCan = document.createElement('canvas');
      faceCan.width = 128;
      faceCan.height = 128;
      const faceCtx = faceCan.getContext('2d');
      let faceReady = false;

      function rand(n) { return Math.random() * n; }
      function irand(n) { return (Math.random() * n) | 0; }

      // Distinct plate styles so colour / pattern really change
      function paintArtwork(style, ctx) {
        ctx = ctx || artFrontCtx;
        const canvas = ctx.canvas;
        canvas.width = ART_W;
        canvas.height = ART_H;
        const bias = irand(360);
        ctx.fillStyle = '#010105';
        ctx.fillRect(0, 0, ART_W, ART_H);

        style = style % 7;

        if (style === 0) {
          // Hot bands — warm / cool stripes
          for (let i = 0; i < 80; i++) {
            const y = rand(ART_H);
            const hue = (bias + (i % 2 === 0 ? rand(50) : 180 + rand(50))) % 360;
            ctx.fillStyle = 'hsla(' + hue + ',95%,' + (20 + rand(28)) + '%,' + (0.55 + rand(0.4)) + ')';
            ctx.fillRect(0, y, ART_W, 2 + rand(14));
          }
          for (let i = 0; i < 12; i++) {
            const y = rand(ART_H);
            ctx.fillStyle = 'hsla(' + ((bias + 30) % 360) + ',100%,' + (35 + rand(15)) + '%,0.85)';
            ctx.fillRect(0, y, ART_W, 8 + rand(20));
          }
        } else if (style === 1) {
          // Cellular blotches
          for (let i = 0; i < 45; i++) {
            const x = rand(ART_W), y = rand(ART_H), r = 20 + rand(90);
            const g = ctx.createRadialGradient(x, y, 0, x, y, r);
            const hue = (bias + rand(120)) % 360;
            g.addColorStop(0, 'hsla(' + hue + ',92%,' + (32 + rand(20)) + '%,0.95)');
            g.addColorStop(0.6, 'hsla(' + ((hue + 60) % 360) + ',85%,22%,0.4)');
            g.addColorStop(1, 'rgba(0,0,0,0)');
            ctx.fillStyle = g;
            ctx.fillRect(0, 0, ART_W, ART_H);
          }
          for (let i = 0; i < 100; i++) {
            ctx.fillStyle = 'hsla(' + ((bias + rand(90)) % 360) + ',90%,' + (18 + rand(25)) + '%,0.5)';
            ctx.fillRect(0, rand(ART_H), ART_W, 1 + rand(3));
          }
        } else if (style === 2) {
          // Fine moiré grids
          for (let i = 0; i < 200; i++) {
            const hue = (bias + i * 3) % 360;
            ctx.fillStyle = 'hsla(' + hue + ',88%,' + (14 + (i % 25)) + '%,' + (0.35 + (i % 5) * 0.1) + ')';
            ctx.fillRect(0, (i / 200) * ART_H, ART_W, 1.5);
          }
          ctx.save();
          ctx.translate(ART_W / 2, ART_H / 2);
          ctx.rotate(0.08);
          ctx.translate(-ART_W / 2, -ART_H / 2);
          for (let i = 0; i < 160; i++) {
            const hue = (bias + 90 + i * 4) % 360;
            ctx.fillStyle = 'hsla(' + hue + ',90%,' + (16 + (i % 20)) + '%,0.3)';
            ctx.fillRect(-20, (i / 160) * ART_H, ART_W + 40, 1);
          }
          ctx.restore();
        } else if (style === 3) {
          // Circuit / crystalline shards
          ctx.globalCompositeOperation = 'lighter';
          for (let i = 0; i < 70; i++) {
            const hue = (bias + rand(100)) % 360;
            ctx.strokeStyle = 'hsla(' + hue + ',100%,' + (30 + rand(25)) + '%,' + (0.4 + rand(0.5)) + ')';
            ctx.lineWidth = 0.5 + rand(4);
            ctx.beginPath();
            let x = rand(ART_W), y = rand(ART_H);
            ctx.moveTo(x, y);
            for (let s = 0; s < 20; s++) {
              if (Math.random() > 0.5) x += (Math.random() - 0.5) * 50;
              else y += (Math.random() - 0.5) * 40;
              ctx.lineTo(x, y);
            }
            ctx.stroke();
          }
          ctx.globalCompositeOperation = 'source-over';
          for (let i = 0; i < 50; i++) {
            ctx.fillStyle = 'hsla(' + ((bias + rand(60)) % 360) + ',95%,' + (22 + rand(20)) + '%,0.55)';
            ctx.fillRect(0, rand(ART_H), ART_W, 2 + rand(6));
          }
        } else if (style === 4) {
          // Neon blocks / stepped bands
          for (let i = 0; i < 40; i++) {
            const y = (i / 40) * ART_H + rand(8);
            const hh = 6 + rand(18);
            const hue = (bias + i * 41 + rand(30)) % 360;
            ctx.fillStyle = 'hsla(' + hue + ',100%,' + (25 + rand(22)) + '%,0.9)';
            ctx.fillRect(0, y, ART_W, hh);
            ctx.fillStyle = 'hsla(' + ((hue + 180) % 360) + ',90%,' + (18 + rand(15)) + '%,0.5)';
            ctx.fillRect(0, y + hh * 0.4, ART_W, hh * 0.25);
          }
          for (let i = 0; i < 30; i++) {
            const x = rand(ART_W);
            ctx.fillStyle = 'hsla(' + ((bias + rand(360)) % 360) + ',100%,40%,0.35)';
            ctx.fillRect(x, 0, 2 + rand(6), ART_H);
          }
        } else if (style === 5) {
          // Fractal mountain / horizon plates — recursive peaks + colour bands
          for (let band = 0; band < 12; band++) {
            const baseY = (band / 12) * ART_H;
            const hue = (bias + band * 31) % 360;
            ctx.fillStyle = 'hsla(' + hue + ',75%,' + (8 + band * 2.5) + '%,0.92)';
            ctx.beginPath();
            ctx.moveTo(0, ART_H);
            for (let x = 0; x <= ART_W; x += 4) {
              let n = 0, amp = 28, freq = 0.018;
              for (let o = 0; o < 5; o++) {
                n += Math.sin(x * freq + band * 1.7 + o) * amp;
                amp *= 0.55;
                freq *= 2.05;
              }
              ctx.lineTo(x, baseY + 30 + n);
            }
            ctx.lineTo(ART_W, ART_H);
            ctx.closePath();
            ctx.fill();
          }
          ctx.globalCompositeOperation = 'lighter';
          for (let i = 0; i < 30; i++) {
            ctx.fillStyle = 'hsla(' + ((bias + 180 + rand(60)) % 360) + ',100%,' + (25 + rand(25)) + '%,0.35)';
            ctx.fillRect(0, rand(ART_H), ART_W, 1 + rand(3));
          }
          ctx.globalCompositeOperation = 'source-over';
        } else {
          // Plasma veins
          ctx.globalCompositeOperation = 'lighter';
          for (let i = 0; i < 25; i++) {
            const hue = (bias + rand(80)) % 360;
            const cx = rand(ART_W), cy = rand(ART_H), r = 40 + rand(80);
            const g = ctx.createRadialGradient(cx, cy, 0, cx, cy, r);
            g.addColorStop(0, 'hsla(' + hue + ',100%,50%,0.7)');
            g.addColorStop(1, 'rgba(0,0,0,0)');
            ctx.fillStyle = g;
            ctx.fillRect(0, 0, ART_W, ART_H);
          }
          ctx.globalCompositeOperation = 'source-over';
          for (let i = 0; i < 60; i++) {
            ctx.fillStyle = 'hsla(' + ((bias + i * 7) % 360) + ',90%,' + (18 + rand(20)) + '%,0.6)';
            ctx.fillRect(0, rand(ART_H), ART_W, 2 + rand(8));
          }
        }
      }

      function beginArtCrossfade(style, elapsed) {
        // Keep current plate on artFront; paint next into artBack and blend in
        paintArtwork(style, artBackCtx);
        artFading = true;
        artBlend = 0;
        artFadeT0 = elapsed;
        artGen += 1;
        tintHueTarget = (tintHue + 20 + Math.random() * 50) % 360;
      }

      function updateArtBlend(elapsed) {
        if (!artFading) {
          artBlend = 1;
          return;
        }
        const t = (elapsed - artFadeT0) / ART_BLEND_DUR;
        if (t >= 1) {
          artFading = false;
          artBlend = 1;
          const sw = artFront;
          const swCtx = artFrontCtx;
          artFront = artBack;
          artFrontCtx = artBackCtx;
          artBack = sw;
          artBackCtx = swCtx;
        } else {
          artBlend = t * t * (3 - 2 * t);
        }
      }

      /** Draw a slit column from front (+ blended back during fade). */
      function resize() {
        // Lower res in VR — Quest GPU is tight with canvas texture + XR
        const w = (presentMode === 'vr') ? 960 : SCAN_W;
        const h = (presentMode === 'vr') ? 540 : SCAN_H;
        if (view.width !== w || view.height !== h) {
          view.width = w;
          view.height = h;
        }
        if (bufA.width === w && bufA.height === h) return;

        const oldA = bufA;
        bufA = document.createElement('canvas');
        bufB = document.createElement('canvas');
        bufA.width = w;
        bufA.height = h;
        bufB.width = w;
        bufB.height = h;
        aCtx = bufA.getContext('2d', { alpha: false });
        bCtx = bufB.getContext('2d', { alpha: false });
        aCtx.fillStyle = '#000';
        aCtx.fillRect(0, 0, w, h);
        bCtx.fillStyle = '#000';
        bCtx.fillRect(0, 0, w, h);
        if (oldA.width) aCtx.drawImage(oldA, 0, 0, w, h);
      }

      function pushTexture() { /* voyage-screen component updates the VR texture */ }

      let vrListenersBound = false;
      function bindVrListeners() {
        if (vrListenersBound) return;
        vrListenersBound = true;
        sceneEl.addEventListener('enter-vr', function () {
          document.body.classList.add('vr-immersive');
          display.hidden = true;
          if (vrHint) vrHint.textContent = 'Immersive VR · voyage on headset loop';
          // Resume audio after XR (Quest often suspends it)
          try {

          startXrVoyageLoop();

        sceneEl.addEventListener('exit-vr', function () {
          document.body.classList.remove('vr-immersive');

            display.hidden = false;
            sizeDisplay();

      const vrHint = document.getElementById('vrHint');

      /** MUST run inside the user click — before heavy work, and without await */
      function enterVrNow() {
        if (isFileOrigin || !isSecure) {
          console.warn('WebXR blocked: need https:// (or localhost), not file:// or plain http LAN');
          if (serveWarn) {
            serveWarn.style.display = 'block';
            serveWarn.innerHTML =
              '<strong>VR blocked on this origin</strong><br>On Quest open<code>' + httpsUrl + '</code>' +
              'Accept the certificate warning, then tap VR.';

        }
        bindVrListeners();
        display.hidden = false;

          if (!sceneEl.enterVR) {
            if (vrHint) vrHint.textContent = 'A-Frame enterVR missing';

      // Stretch one art column into a vertical slit, scrolling upward only
      // (never reverses — keeps wall texture flowing past as we fly in).
      function drawSlitCol(ctx, col, x, slitW, h, yScroll) {
        col = ((col % ART_W) + ART_W) % ART_W;
        const scrollPx = ((yScroll % ART_H) / ART_H) * h;
        const a = ctx.globalAlpha;
        function blit(src) {
          ctx.drawImage(src, col, 0, 1, ART_H, x, -scrollPx, slitW, h);
          ctx.drawImage(src, col, 0, 1, ART_H, x, -scrollPx + h, slitW, h);
        }
        blit(artFront);
        if (artFading && artBlend > 0.01) {
          ctx.globalAlpha = a * artBlend;
          blit(artBack);
          ctx.globalAlpha = a;
        }
      }

      // Single corridor slit-scan: inject near the vanishing point only.
      // Wider slits + a short fan of near-centre stamps so walls flare out sooner.
      function stampCorridor(ctx, w, h) {
        const cx = w * 0.5;
        const slitW = Math.max(3, Math.round(w * 0.0065));
        const gap = 1;
        const leftX = Math.floor(cx - gap - slitW);
        const rightX = Math.floor(cx + gap);

        const col = Math.floor(artScroll);
        const colL = ((col % ART_W) + ART_W) % ART_W;
        const colR = ((col + Math.floor(ART_W * 0.41)) % ART_W + ART_W) % ART_W;

        ctx.imageSmoothingEnabled = false;
        drawSlitCol(ctx, colL, leftX, slitW, h, artScrollY);
        drawSlitCol(ctx, colR, rightX, slitW, h, artScrollY * 1.07);

        // Companion slits stepping outward a little — fills the cone / wider angle
        ctx.globalAlpha = 0.75;
        drawSlitCol(ctx, (colL + 53) % ART_W, leftX - slitW - 1, slitW, h, artScrollY);
        drawSlitCol(ctx, (colR + 71) % ART_W, rightX + slitW + 1, slitW, h, artScrollY * 1.07);
        ctx.globalAlpha = 0.48;
        drawSlitCol(ctx, (colL + 97) % ART_W, leftX - slitW * 2 - 2, slitW, h, artScrollY);
        drawSlitCol(ctx, (colR + 113) % ART_W, rightX + slitW * 2 + 2, slitW, h, artScrollY * 1.07);
        ctx.globalAlpha = 0.28;
        drawSlitCol(ctx, (colL + 131) % ART_W, leftX - slitW * 3 - 3, slitW, h, artScrollY);
        drawSlitCol(ctx, (colR + 149) % ART_W, rightX + slitW * 3 + 3, slitW, h, artScrollY * 1.07);
        ctx.globalAlpha = 1;
      }

        // Audio cue by kind

        } else if (kind === 'rings' || kind === 'gates') {
